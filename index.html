<!DOCTYPE html>
<html>

<head>
    <title>Smart Wheat Procurement System</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Segoe UI, sans-serif;
            background: #eef2f7;
        }

        .sidebar {
            width: 220px;
            height: 100vh;
            background: #1e3a5f;
            color: white;
            position: fixed;
            padding-top: 20px;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar button {
            width: 90%;
            margin: 10px;
            padding: 12px;
            border: none;
            background: #2f5d91;
            color: white;
            cursor: pointer;
            border-radius: 6px;
        }

        .sidebar button:hover {
            background: #4179b3;
        }

        .main {
            margin-left: 240px;
            padding: 25px;
        }

        .cards {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            flex: 1;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .page {
            display: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.1);
        }

        th,
        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #2f5d91;
            color: white;
        }

        input,
        select {
            padding: 10px;
            margin: 10px;
            width: 200px;
        }

        .action {
            background: #2f5d91;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        .action:hover {
            background: #1f4a77;
        }
    </style>
</head>

<body>

    <!-- ✅ WELCOME SCREEN -->
    <div id="welcomeScreen"
        style="height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#1e3a5f;color:white;">
        <h1>🌾 Smart Wheat Procurement System</h1>
        <button onclick="startApp()"
            style="padding:15px 30px;font-size:18px;background:#2f5d91;border:none;color:white;border-radius:8px;">Get
            Started</button>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar" id="appUI" style="display:none;">
        <h2>🌾 Wheat System</h2>
        <button onclick="showPage('dashboard')">Dashboard</button>
        <button onclick="showPage('farmer')">Farmer Registration</button>
        <button onclick="showPage('slot')">Slot Booking</button>
        <button onclick="showPage('center')">Procurement Center</button>
        <button onclick="showPage('payment')">Payments</button>
    </div>

    <!-- MAIN -->
    <div class="main" id="mainUI" style="display:none;">

        <!-- DASHBOARD -->
        <div id="dashboard" class="page">
            <h1>Admin Dashboard</h1>
            <div class="cards">
                <div class="card">
                    <h3>Total Farmers</h3>
                    <h2>0</h2>
                </div>
                <div class="card">
                    <h3>Wheat Collected</h3>
                    <h2>0 Tons</h2>
                </div>
                <div class="card">
                    <h3>Pending Payments</h3>
                    <h2>0</h2>
                </div>
            </div>
            <canvas id="wheatChart"></canvas>
        </div>

        <!-- FARMER -->
        <div id="farmer" class="page">
            <h1>Farmer Registration</h1>
            <input type="text" placeholder="Name"><br>
            <input type="text" placeholder="ID"><br>
            <input type="text" placeholder="Mobile"><br>
            <input type="text" placeholder="Village"><br>
            <input type="number" placeholder="Quantity"><br>
            <br>
            <button class="action" onclick="registerFarmer()">Register</button>
            <p id="regMsg"></p>
            <div id="farmerTable"></div>
        </div>

        <!-- SLOT -->
        <div id="slot" class="page">
            <h1>Slot Booking</h1>
            <select id="bookingCenter">
                <option value="">Select Center</option>
                <option value="Center A">Center A</option>
                <option value="Center B">Center B</option>
                <option value="Center C">Center C</option>
                <option value="Center D">Center D</option>
                <option value="Center E">Center E</option>
            </select>
            <input type="date">

            <select id="slotTime">
                <option value="">Select Time</option>
                <option value="10 AM">10 AM</option>
                <option value="12 PM">12 PM</option>
                <option value="2 PM">2 PM</option>
                <option value="4 PM">4 PM</option>
            </select>
            <br>
            <button class="action" onclick="bookSlot()">Book</button>
            <p id="slotMsg"></p>
        </div>

        <!-- CENTER -->
        <div id="center" class="page">
            <h1>Procurement</h1>
            <table></table>
        </div>

        <!-- PAYMENT -->
        <div id="payment" class="page">
            <h1>Payments</h1>
            <table></table>
        </div>

    </div>

    <script>

        // DATA
        let farmers = JSON.parse(localStorage.getItem("farmers")) || [];
        let slots = JSON.parse(localStorage.getItem("slots")) || [];
        let isAdmin = false;

        // START
        function startApp() {
            document.getElementById("welcomeScreen").style.display = "none";
            document.getElementById("appUI").style.display = "block";
            document.getElementById("mainUI").style.display = "block";
            showPage("dashboard");
        }
        let chart;

        function initChart() {

            let ctx = document.getElementById("wheatChart");

            chart = new Chart(ctx, {
                type: "bar",
                data: {
                    labels: [],
                    datasets: [{
                        label: "Wheat Quantity",
                        data: []
                    }]
                }
            });
        }
        function updateChart(){

    let labels = [];
    let data = [];

    slots.forEach((s, i)=>{
        let farmer = farmers.find(f => f.id === s.farmerId);

        if(farmer){
            labels.push(farmer.name);
            data.push(Number(farmer.quantity || 0));
        }
    });

    console.log("Labels:", labels);
    console.log("Data:", data);

    chart.data.labels = labels;
    chart.data.datasets[0].data = data;

    chart.update();
}

        // LOGIN
        function loginAdmin() {
            let u = prompt("Admin username:");
            let p = prompt("Password:");
            if (u === "admin" && p === "1234") { isAdmin = true; }
            else alert("Wrong login");
        }

        // NAV
        function showPage(page) {

            if ((page === "slot" || page === "center" || page === "payment") && !isAdmin) {
                loginAdmin();
                if (!isAdmin) return;
            }

            document.querySelectorAll(".page").forEach(p => p.style.display = "none");
            document.getElementById(page).style.display = "block";

            // 🔥 ADD THIS
            if (page === "payment") {
                checkPayment();
            }
        }

        // FARMER
        function registerFarmer() {
            let i = document.querySelectorAll("#farmer input");
            let f = { name: i[0].value, id: i[1].value, village: i[3].value, quantity: i[4].value };
            if (farmers.find(x => x.id === f.id)) { regMsg.innerHTML = "Duplicate ID"; return; }
            farmers.push(f);
            localStorage.setItem("farmers", JSON.stringify(farmers));
            i.forEach(x => x.value = "");
            regMsg.innerHTML = "Registered";
            renderFarmers(); updateDashboard();
            updateChart();
        }

        function renderFarmers() {
            let html = "<table><tr><th>Name</th><th>ID</th><th>Village</th><th>Qty</th></tr>";
            farmers.forEach(f => html += `<tr><td>${f.name}</td><td>${f.id}</td><td>${f.village}</td><td>${f.quantity}</td></tr>`);
            html += "</table>";
            farmerTable.innerHTML = html;
        }

        // SLOT
        function bookSlot() {
            if (farmers.length === 0) { slotMsg.innerHTML = "Register first"; return; }
            let selectedTime = document.getElementById("slotTime").value;

            let s = {
                farmerId: farmers[slots.length].id,
                time: selectedTime,
                status: "Scheduled",
                payment: "Pending"
            }; slots.push(s);
            localStorage.setItem("slots", JSON.stringify(slots));
            slotMsg.innerHTML = "Booked";
            renderSlots(); updateDashboard();updateChart();

        }

        // PROCUREMENT
        function renderSlots() {
            let html = "<tr><th>Name</th><th>Qty</th><th>Slot</th><th>Status</th><th>Action</th></tr>";
            slots.forEach((s, i) => {
                let f = farmers.find(x => x.id === s.farmerId);
                html += `<tr>
<td>${f.name}</td>
<td>${f.quantity}</td>
<td>${s.time}</td>
<td>${s.status}</td>
<td>${s.status === "Scheduled" ? `<button onclick="markReceived(${i})">Receive</button>` : "Done"}</td>
</tr>`;
            });
            document.querySelector("#center table").innerHTML = html;
        }

        function markReceived(i) {
            slots[i].status = "Received";
            slots[i].payment = "Processing";
            localStorage.setItem("slots", JSON.stringify(slots));
            renderSlots(); updateDashboard();updateChart();

        }

        // PAYMENT
        function checkPayment() {

            let table = document.querySelector("#payment table");

            if (!table) return;

            let html = `
    <tr>
    <th>Name</th>
    <th>Qty</th>
    <th>Status</th>
    <th>Action</th>
    </tr>
    `;

            slots.forEach((s, i) => {

                let f = farmers.find(x => x.id === s.farmerId);

                html += `
        <tr>
        <td>${f ? f.name : "-"}</td>
        <td>${f ? f.quantity : "-"}</td>
        <td>${s.payment}</td>
        <td>
            ${s.payment === "Processing"
                        ? `<button class="action" onclick="markPaid(${i})">Mark Paid</button>`
                        : (s.payment === "Paid" ? "Paid" : "-")
                    }
        </td>
        </tr>
        `;
            });

            table.innerHTML = html;
        }

        // ✅ FIXED BUTTON ISSUE
        function markPaid(i) {
            slots[i].payment = "Paid";
            localStorage.setItem("slots", JSON.stringify(slots));
            checkPayment();
            updateDashboard();
            updateChart();

        }

        // DASHBOARD
        function updateDashboard() {
            document.querySelectorAll(".card h2")[0].innerText = farmers.length;
            document.querySelectorAll(".card h2")[1].innerText = farmers.reduce((a, b) => a + Number(b.quantity || 0), 0) + " Tons";
            document.querySelectorAll(".card h2")[2].innerText = slots.filter(s => s.payment !== "Paid").length;
        }

        // INIT
        window.onload = function () {
            renderFarmers();
            renderSlots();
            checkPayment();
            updateDashboard();

            initChart();   // create chart
            updateChart(); // fill data
        }

        // CHART
        

    </script>

</body>

</html>
