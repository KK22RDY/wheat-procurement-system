<!DOCTYPE html>
<html>
<head>
<title>Smart Wheat Procurement System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI, sans-serif;
background:#eef2f7;
}

/* WELCOME PAGE */
#welcome{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#1e3a5f;
color:white;
}

#welcome button{
padding:15px 30px;
font-size:18px;
background:#2f5d91;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

/* SIDEBAR */
.sidebar{
width:220px;
height:100vh;
background:#1e3a5f;
color:white;
position:fixed;
padding-top:20px;
display:none;
}

.sidebar button{
width:90%;
margin:10px;
padding:12px;
border:none;
background:#2f5d91;
color:white;
cursor:pointer;
border-radius:6px;
}

.main{
margin-left:240px;
padding:25px;
display:none;
}

.cards{
display:flex;
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
flex:1;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
text-align:center;
}

.page{
display:none;
}

table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:center;
}

th{
background:#2f5d91;
color:white;
}

input,select{
padding:10px;
margin:10px;
width:200px;
}

.action{
background:#2f5d91;
color:white;
border:none;
padding:10px 20px;
border-radius:5px;
cursor:pointer;
}

</style>
</head>

<body>

<!-- ✅ WELCOME PAGE -->
<div id="welcome">
<h1>🌾 Smart Wheat Procurement System</h1>
<p>Efficient & Transparent Procurement</p>
<button onclick="startApp()">Get Started</button>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<h2 style="text-align:center;">🌾 Wheat System</h2>

<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('farmer')">Farmer Registration</button>
<button onclick="showPage('center')">Procurement Center</button>

</div>

<!-- MAIN -->
<div class="main" id="main">

<!-- DASHBOARD -->
<div id="dashboard" class="page">

<h1>Dashboard</h1>

<div class="cards">
<div class="card"><h3>Total Farmers</h3><h2 id="totalFarmers">0</h2></div>
<div class="card"><h3>Wheat Collected</h3><h2 id="totalWheat">0</h2></div>
</div>

<canvas id="wheatChart"></canvas>

</div>

<!-- FARMER -->
<div id="farmer" class="page">

<h1>Register Farmer</h1>

<input id="name" placeholder="Farmer Name"><br>
<input id="qty" type="number" placeholder="Quantity"><br>

<button class="action" onclick="registerFarmer()">Register</button>

<p id="msg"></p>

</div>

<!-- PROCUREMENT CENTER -->
<div id="center" class="page">

<h1>Procurement Center</h1>

<table id="farmerTable">
<tr>
<th>Name</th>
<th>Quantity</th>
<th>Status</th>
</tr>
</table>

</div>

</div>

<script>

let farmers=[];

/* START APP */
function startApp(){
document.getElementById("welcome").style.display="none";
document.getElementById("sidebar").style.display="block";
document.getElementById("main").style.display="block";
showPage("dashboard");
}

/* PAGE SWITCH */
function showPage(page){
let pages=document.getElementsByClassName("page");
for(let p of pages) p.style.display="none";
document.getElementById(page).style.display="block";
}

/* REGISTER FARMER */
function registerFarmer(){

let name=document.getElementById("name").value;
let qty=document.getElementById("qty").value;

if(name=="" || qty==""){
document.getElementById("msg").innerHTML="Fill all fields!";
return;
}

let farmer={name, qty, status:"Pending"};
farmers.push(farmer);

document.getElementById("msg").innerHTML="Farmer Added!";
updateTable();
updateDashboard();

}

/* UPDATE TABLE */
function updateTable(){

let table=document.getElementById("farmerTable");

table.innerHTML=`
<tr>
<th>Name</th>
<th>Quantity</th>
<th>Status</th>
</tr>`;

farmers.forEach((f,i)=>{
table.innerHTML+=`
<tr>
<td>${f.name}</td>
<td>${f.qty}</td>
<td onclick="markReceived(${i})" style="cursor:pointer;color:blue;">
${f.status}
</td>
</tr>`;
});

}

/* UPDATE STATUS */
function markReceived(index){
farmers[index].status="Received";
updateTable();
}

/* DASHBOARD UPDATE */
function updateDashboard(){

document.getElementById("totalFarmers").innerHTML=farmers.length;

let total=0;
farmers.forEach(f=> total+=Number(f.qty));

document.getElementById("totalWheat").innerHTML=total+" Q";

}

/* CHART */
new Chart(document.getElementById('wheatChart'),{
type:'bar',
data:{
labels:['Mon','Tue','Wed'],
datasets:[{
label:'Expected Wheat',
data:[20,40,60]
}]
}
});

</script>

</body>
</html>
